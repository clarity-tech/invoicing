name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      matrix:
        target: [frankenphp]
        # target: [frankenphp, nginx-fpm, standalone, standalone-alpine]
        include:
          - target: frankenphp
            dockerfile: docker/production/Dockerfile.frankenphp
            image-suffix: ''
            build-target: production
          # - target: nginx-fpm
          # dockerfile: docker/production/Dockerfile.nginx-fpm
          # image-suffix: '-nginx'
          # build-target: production
          # - target: standalone
          # dockerfile: docker/production/Dockerfile.standalone
          # image-suffix: '-standalone'
          # build-target: runtime
          # - target: standalone-alpine
          # dockerfile: docker/production/Dockerfile.standalone
          # image-suffix: '-standalone-alpine'
          # build-target: standalone-alpine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image-suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.build-target }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            VITE_APP_NAME=Clarity InvoiceInk

      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image-suffix }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.target }}.sarif'
          ignore-unfixed: true

      - name: Debug Trivy output
        run: ls -al

      - name: Upload Trivy scan results to GitHub Security tab
        if: ${{ always() && hashFiles(format('trivy-results-{0}.sarif', matrix.target)) != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results-${{ matrix.target }}.sarif'

  test-images:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        target: [frankenphp]
        # target: [frankenphp, nginx-fpm, standalone, standalone-alpine]
        include:
          - target: frankenphp
            image-suffix: ''
            port: 8080
          # - target: nginx-fpm
          #   image-suffix: '-nginx'
          #   port: 80
          # - target: standalone
          #   image-suffix: '-standalone'
          #   port: 8000
          # - target: standalone-alpine
          #   image-suffix: '-standalone-alpine'
          #   port: 8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Docker image
        run: |
          # Pull the image by digest (guaranteed to exist after build-and-push)
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image-suffix }}:pr-${{ github.event.pull_request.number }}"
          echo "Testing image: $IMAGE"

          # Start the container with ServerSideUp env vars
          docker run -d \
            --name test-container \
            -p ${{ matrix.port }}:${{ matrix.port }} \
            -e APP_KEY=base64:$(openssl rand -base64 32) \
            -e APP_ENV=testing \
            -e APP_URL=http://localhost:${{ matrix.port }} \
            -e DB_CONNECTION=sqlite \
            -e "DB_DATABASE=/var/www/html/storage/database.sqlite" \
            -e CACHE_STORE=array \
            -e SESSION_DRIVER=array \
            -e QUEUE_CONNECTION=sync \
            -e AUTORUN_ENABLED=true \
            -e AUTORUN_LARAVEL_MIGRATION=true \
            -e AUTORUN_LARAVEL_MIGRATION_SKIP_DB_CHECK=true \
            -e AUTORUN_LARAVEL_OPTIMIZE=false \
            "$IMAGE"

          # Wait for container to be healthy
          for i in {1..20}; do
            if curl -sf http://localhost:${{ matrix.port }}/up; then
              echo "Health check passed"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "Container failed to start"
              docker logs test-container
              exit 1
            fi
            echo "Attempt $i, retrying..."
            sleep 3
          done

          # Test main page (should redirect to login)
          curl -I http://localhost:${{ matrix.port }}/ | grep -E "(200|302)"

          # Cleanup
          docker stop test-container
          docker rm test-container

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment logic here
          # Example: kubectl, docker-compose, or other deployment tools

  deploy-production:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment logic here
          # Example: kubectl, docker-compose, or other deployment tools

  notify:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify on success
        if: ${{ needs.build-and-push.result == 'success' }}
        run: |
          echo "✅ Docker images built and pushed successfully!"
          echo "Images available at: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

      - name: Notify on failure
        if: ${{ needs.build-and-push.result == 'failure' }}
        run: |
          echo "❌ Docker image build failed!"
          exit 1
