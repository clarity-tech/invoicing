name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, with-jetstream]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint (format check)
        run: vendor/bin/pint --test

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run vue-tsc --noEmit --skipLibCheck 2>/dev/null || true

  test-php:
    name: PHP Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend assets
        run: bun run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/APP_ENV=local/APP_ENV=testing/' .env
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=:memory:|' .env
          echo "CACHE_STORE=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "MAIL_MAILER=array" >> .env
          echo "TELESCOPE_ENABLED=false" >> .env
          echo "CHROME_SERVICE_ENABLED=true" >> .env
          echo "CHROME_SERVICE_URL=http://localhost:3000" >> .env

      - name: Start Chrome PDF service
        run: |
          docker run -d --name chrome-pdf \
            -p 3000:3000 \
            -v ${{ github.workspace }}/docker/chrome/pdf-service.js:/usr/src/app/pdf-service.js \
            ghcr.io/zenika/alpine-chrome:with-puppeteer \
            node /usr/src/app/pdf-service.js
          timeout 30 bash -c 'until curl -sf http://localhost:3000/health; do sleep 1; done'

      - name: Run Unit & Feature tests
        run: php artisan test --testsuite=Unit,Feature --compact

  test-octane:
    name: Production Image (FrankenPHP) Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/APP_ENV=local/APP_ENV=testing/' .env
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=database/database.sqlite|' .env
          echo "TELESCOPE_ENABLED=false" >> .env
          touch database/database.sqlite
          php artisan migrate --force

      - name: Run production image tests
        run: ./docker/production/test-octane.sh

      - name: Show container logs on failure
        if: failure()
        run: docker logs invoicing-octane-test 2>/dev/null || true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: octane-browser-screenshots
          path: tests/Browser/Screenshots/
          retention-days: 7

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run Vitest
        run: bun run test

  test-browser:
    name: Browser Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend assets
        run: bun run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/APP_ENV=local/APP_ENV=testing/' .env
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=:memory:|' .env
          echo "CACHE_STORE=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "MAIL_MAILER=array" >> .env
          echo "TELESCOPE_ENABLED=false" >> .env

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Browser Smoke Tests
        run: php artisan test tests/Browser/SmokeTest.php tests/Browser/AuthenticatedSmokeTest.php --compact

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-screenshots
          path: tests/Browser/Screenshots/
          retention-days: 7

  build-check:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend assets
        run: bun run build
