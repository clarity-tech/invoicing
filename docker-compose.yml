services:
    laravel.test:
        build:
            context: ./docker/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
                WWWUSER: '${WWWUSER:-1000}'
        image: ghcr.io/clarity-tech/laravel-strict:php8.5
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
            - 'sail-playwright:/opt/playwright-browsers'
        networks:
            - sail
        depends_on:
            - valkey
            - mailpit
            - pgsql
            - rustfs
    valkey:
        image: 'valkey/valkey:alpine'
        ports:
            - '${FORWARD_VALKEY_PORT:-6379}:6379'
        volumes:
            - 'sail-valkey:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - valkey-cli
                - ping
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
    pgsql:
        image: postgres:17-alpine
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE:-laravel}'
            POSTGRES_USER: '${DB_USERNAME:-sail}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
            - './docker/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 10
            timeout: 5s

    pgweb:
        image: sosedoff/pgweb
        ports:
            - '${FORWARD_PGWEB_PORT:-8081}:8081'
        environment:
            DATABASE_URL: 'postgres://${DB_USERNAME:-sail}:${DB_PASSWORD:-secret}@pgsql:5432/${DB_DATABASE:-laravel}?sslmode=disable'
        depends_on:
            - pgsql
        networks:
            - sail

    rustfs:
        image: 'rustfs/rustfs:latest'
        ports:
            - '${FORWARD_RUSTFS_PORT:-9000}:9000'
            - '${FORWARD_RUSTFS_CONSOLE_PORT:-9001}:9001'
        environment:
            RUSTFS_VOLUMES: '/data'
            RUSTFS_ADDRESS: '0.0.0.0:9000'
            RUSTFS_CONSOLE_ADDRESS: '0.0.0.0:9001'
            RUSTFS_CONSOLE_ENABLE: 'true'
            RUSTFS_EXTERNAL_ADDRESS: ':9000'
            RUSTFS_CORS_ALLOWED_ORIGINS: '*'
            RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: '*'
            RUSTFS_ACCESS_KEY: 'sail'
            RUSTFS_SECRET_KEY: 'password'
            RUSTFS_LOG_LEVEL: 'info'
        volumes:
            - 'sail-rustfs:/data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "sh", "-c", "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    gotenberg:
        image: 'gotenberg/gotenberg:8'
        ports:
            - '${FORWARD_GOTENBERG_PORT:-3000}:3000'
        command:
            - 'gotenberg'
            - '--chromium-disable-javascript=true'
            - '--api-timeout=30s'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
            interval: 30s
            timeout: 10s
            retries: 3

networks:
    sail:
        driver: bridge
volumes:
    sail-valkey:
        driver: local
    sail-pgsql:
        driver: local
    sail-rustfs:
        driver: local
    sail-playwright:
        driver: local
