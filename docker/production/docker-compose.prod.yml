# Production Docker Compose configuration for Laravel Invoicing with FrankenPHP + Octane
version: '3.8'

services:
  # Main application with ServerSideUp FrankenPHP + Octane
  # Docs: https://serversideup.net/open-source/docker-php/docs/framework-guides/laravel/octane
  app:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile.frankenphp
      target: production
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: ghcr.io/clarity-tech/invoicing:latest
    container_name: invoicing-app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-80}:8080'
    environment:
      # Laravel Configuration
      - APP_NAME=${APP_NAME:-Clarity InvoiceInk}
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-https://invoicing.claritytech.io}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}

      # Database Configuration
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-invoicing}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}

      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379

      # Session and Cache
      - SESSION_DRIVER=redis
      - SESSION_LIFETIME=120
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis

      # ServerSideUp Autorun (migrate, optimize, storage:link)
      - AUTORUN_ENABLED=true
      - AUTORUN_LARAVEL_MIGRATION=true
      - AUTORUN_LARAVEL_MIGRATION_ISOLATION=true
      - AUTORUN_LARAVEL_OPTIMIZE=true
      - AUTORUN_LARAVEL_STORAGE_LINK=true
      - AUTORUN_LARAVEL_MIGRATION_SEED=${RUN_SEEDERS:-false}

      # PHP / OPcache
      - PHP_OPCACHE_ENABLE=1

      # Mail Configuration
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME="${MAIL_FROM_NAME:-Clarity InvoiceInk}"

      # File Storage
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-s3}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BUCKET=${AWS_BUCKET}
      - AWS_ENDPOINT=${AWS_ENDPOINT}

      # Logging
      - LOG_CHANNEL=stderr
      - LOG_LEVEL=${LOG_LEVEL:-info}

    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - invoicing-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'healthcheck-octane']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # PostgreSQL database
  postgres:
    image: postgres:17-alpine
    container_name: invoicing-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DATABASE:-invoicing}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - invoicing-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-invoicing}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis for caching, sessions, and queues
  redis:
    image: redis:7-alpine
    container_name: invoicing-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis-data:/data
    networks:
      - invoicing-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  # Optional: Nginx reverse proxy (if using load balancer)
  nginx:
    image: nginx:alpine
    container_name: invoicing-nginx
    restart: unless-stopped
    ports:
      - '${NGINX_HTTP_PORT:-80}:80'
      - '${NGINX_HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - invoicing-network
    depends_on:
      - app
    profiles:
      - with-nginx

  # Optional: Database backup service
  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: invoicing-backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${DB_DATABASE:-invoicing}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_EXTRA_OPTS=-Z6 --schema=public --blobs
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - postgres-backups:/backups
    networks:
      - invoicing-network
    depends_on:
      - postgres
    profiles:
      - with-backups

  # Optional: Application monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: invoicing-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    networks:
      - invoicing-network
    profiles:
      - with-monitoring

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  app-storage:
    driver: local
  postgres-backups:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local

networks:
  invoicing-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
