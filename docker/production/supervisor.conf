[supervisord]
nodaemon=true
user=www
loglevel=info
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisor/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor/supervisor.sock
chmod=0700
chown=www:www

[supervisorctl]
serverurl=unix:///var/run/supervisor/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

; ---------------------------------------------
; Laravel Queue Worker
; ---------------------------------------------
[program:laravel-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --timeout=60
directory=/app
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www
numprocs=2
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

; ---------------------------------------------
; Laravel Schedule
; ---------------------------------------------
[program:laravel-schedule]
process_name=%(program_name)s
command=/bin/sh -c 'while true; do php /app/artisan schedule:run; sleep 60; done'
directory=/app
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

; ---------------------------------------------
; Laravel Horizon (optional)
; ---------------------------------------------
[program:laravel-horizon]
process_name=%(program_name)s
command=php /app/artisan horizon
directory=/app
autostart=false
autorestart=true
stopasgroup=true
killasgroup=true
user=www
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

; ---------------------------------------------
; Laravel Reverb (optional)
; ---------------------------------------------
[program:laravel-reverb]
process_name=%(program_name)s
command=php /app/artisan reverb:start --host=0.0.0.0 --port=8080
directory=/app
autostart=false
autorestart=true
stopasgroup=true
killasgroup=true
user=www
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
